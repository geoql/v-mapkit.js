version: 2
updates:
  # Library package (published to npm + jsr) — pinned real semver
  - package-ecosystem: npm
    directory: "/packages/v-mapkit"
    versioning-strategy: increase
    schedule:
      interval: daily
      time: "00:00"
    assignees:
      - vinayakkulkarni
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  # Root workspace + apps (catalogs live in pnpm-workspace.yaml)
  - package-ecosystem: npm
    directory: "/"
    versioning-strategy: increase
    schedule:
      interval: daily
      time: "00:00"
    assignees:
      - vinayakkulkarni
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "00:00"
    assignees:
      - vinayakkulkarni
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
