name: Deploy Docs

on:
  workflow_call:
    inputs:
      skip-build:
        description: 'Download build artifact from CI instead of rebuilding'
        default: false
        required: false
        type: boolean
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Download build artifact
        if: inputs.skip-build == true
        uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: apps/docs/dist/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        if: inputs.skip-build != true
        run: pnpm --filter v-mapkit.js-docs run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NITRO_PRESET: cloudflare-pages

      - name: Deploy to Cloudflare Pages
        working-directory: apps/docs
        run: pnpm exec wrangler pages deploy dist --project-name=v-mapkit.js-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
