name: Deploy Docs

on:
  workflow_call:
    inputs:
      skip-build:
        description: "Download build artifact from CI instead of rebuilding"
        default: false
        required: false
        type: boolean
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Download build artifact
        if: inputs.skip-build == true
        uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: apps/docs/dist/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clear Nuxt build cache
        if: inputs.skip-build != true
        run: |
          rm -rf apps/docs/.nuxt apps/docs/dist
          find apps/docs/node_modules/.cache/nuxt -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true

      - name: Build docs
        if: inputs.skip-build != true
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "Build attempt $attempt/$max_attempts..."
            if pnpm --filter v-mapkit-docs run build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Build failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "Build failed after $max_attempts attempts"
          exit 1
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NITRO_PRESET: cloudflare-pages
          NUXT_TELEMETRY_DISABLED: 1
          NUXT_APP_ENV: production

      - name: Deploy to Cloudflare Pages
        working-directory: apps/docs
        run: pnpm exec wrangler pages deploy dist --project-name=v-mapkit-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
