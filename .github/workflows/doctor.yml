name: "Doctor"

on:
  workflow_call:
    secrets:
      DOCTOR_API_KEY:
        description: "API key for pushing scores to app.the-doctor.report"
        required: false

permissions:
  contents: read

jobs:
  doctor:
    name: "Vue Doctor"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm --filter mapkit-cn-app run postinstall

      - name: Audit with vue-doctor
        uses: geoql/doctor-action@v1
        with:
          framework: vue
          threshold: ${{ vars.DOCTOR_THRESHOLD || '70' }}
          fail-on: error
          api-key: ${{ secrets.DOCTOR_API_KEY }}
          project: ${{ github.repository }}
