name: "Vue Doctor"

on:
  workflow_call:
    secrets:
      DOCTOR_API_KEY:
        description: "API key for pushing the library score to app.the-doctor.report"
        required: false

permissions:
  contents: read

jobs:
  vue-doctor:
    name: "Vue Doctor"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --filter @geoql/v-mapkit... --frozen-lockfile

      - name: Audit library with vue-doctor
        uses: geoql/doctor-action@v1
        with:
          framework: vue
          working-directory: packages/v-mapkit
          threshold: ${{ vars.DOCTOR_THRESHOLD || '70' }}
          fail-on: error
          api-key: ${{ secrets.DOCTOR_API_KEY }}
          project: geoql/v-mapkit
