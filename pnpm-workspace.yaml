packages:
  - "packages/*"
  - "apps/*"

allowBuilds:
  "@mongodb-js/zstd": true
  "@parcel/watcher": true
  better-sqlite3: true
  core-js-pure: true
  esbuild: true
  node-liblzma: true
  sharp: true
  vue-demi: true
  workerd: true

# Catalogs centralize dependency versions across the monorepo. Sub-packages
# reference these with `catalog:` (default) or `catalog:<name>`. The published
# library (packages/v-mapkit) does NOT use catalogs — npm/yarn/jsr consumers
# don't understand the protocol, so its deps stay real semver. Only the root and
# the apps reference catalogs. Requires pnpm v9.5+ (this repo pins pnpm v11).
catalogs:
  default:
    # Root dev tooling
    "@commitlint/cli": ^21.0.2
    "@commitlint/config-conventional": ^21.0.2
    husky: ^9.1.7
    is-ci: ^4.1.0
    lint-staged: ^17.0.7
    # Shared by both apps
    "@nuxtjs/plausible": ^3.0.2
    nuxt: ^4.4.8
    wrangler: ^4.100.0

  app:docs:
    "@comark/nuxt": ^0.4.0
    agents: ^0.16.0
    better-sqlite3: ^12.10.0
    docus: ^5.12.1
    oxlint: ^1.69.0
    zod: ^4.4.3
    zod-to-json-schema: ^3.25.2

  app:mapkit-cn:
    "@iconify-json/lucide": ^1.2.111
    "@iconify-json/simple-icons": ^1.2.86
    "@nuxt/fonts": ^0.14.0
    "@nuxt/icon": ^2.2.3
    "@nuxtjs/color-mode": ^4.0.1
    # Pinned: only 7.x supports Tailwind v4. Do NOT bump to 6.x.
    "@nuxtjs/tailwindcss": 7.0.0-beta.1
    "@resvg/resvg-wasm": ^2.6.2
    "@tailwindcss/typography": ^0.5.20
    "@vueuse/core": ^14.3.0
    "@vueuse/nuxt": ^14.3.0
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    lucide-vue-next: ^0.469.0
    nuxt-og-image: ^6.6.0
    reka-ui: ^2.9.10
    satori: ^0.26.0
    shadcn-nuxt: ^2.7.4
    shiki: ^4.2.0
    tailwind-merge: ^3.6.0
    tailwindcss: ^4.3.0
    tailwindcss-animate: ^1.0.7
    tw-animate-css: ^1.4.0
    typescript: ^6.0.3
    vue: ^3.5.38
    vue-tsc: ^3.3.4
